<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Juuls reizen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js" defer></script>

  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2230;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #4d9fff;
      --accent-rgb: 77, 159, 255;
      --border: #2d3340;
      --border-hover: #484f5c;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --radius: 14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Instrument Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 17, 23, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
    }

    .header-left { display: flex; align-items: baseline; gap: 14px; }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-stats { color: var(--muted); font-size: 13px; white-space: nowrap; }

    .toggle {
      display: inline-flex;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }

    .toggle button {
      background: transparent;
      color: var(--muted);
      border: 0;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .toggle button:hover:not(.active) { color: var(--text); }

    .toggle button.active {
      background: var(--text);
      color: var(--bg);
    }

    main { position: relative; height: calc(100vh - 57px); }

    .view {
      position: absolute; inset: 0; overflow: auto;
      opacity: 0; visibility: hidden; transition: opacity 0.25s ease;
    }
    .view.active { opacity: 1; visibility: visible; }

    #map { height: 100%; width: 100%; background: #090d12; }

    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .leaflet-popup-content { margin: 12px 14px; font-size: 14px; line-height: 1.5; }
    .leaflet-popup-content b { color: var(--text); font-weight: 600; }
    .leaflet-popup-content small { color: var(--muted); }
    .leaflet-popup-content .popup-link {
      color: var(--accent); cursor: pointer;
      display: inline-block; margin-top: 8px;
      font-size: 13px; font-weight: 500;
    }

    #timeline { padding: 40px 28px 80px; max-width: 920px; margin: 0 auto; }

    .timeline-line { position: relative; padding-left: 32px; }

    .timeline-line::before {
      content: "";
      position: absolute; left: 8px; top: 8px; bottom: 8px;
      width: 1px;
      background: linear-gradient(180deg, var(--accent), transparent);
      opacity: 0.35;
    }

    @keyframes tl-enter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tl-item {
      position: relative; margin-bottom: 14px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px; cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      animation: tl-enter 0.35s ease both;
    }

    .tl-item:hover {
      transform: translateY(-2px);
      border-color: var(--border-hover);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35),
                  0 0 0 1px rgba(var(--accent-rgb), 0.1);
    }

    .tl-item::before {
      content: "";
      position: absolute; left: -29px; top: 24px;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--bg),
                  0 0 0 5px color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .tl-item h3 {
      margin: 0 0 5px; font-size: 17px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      justify-content: space-between; letter-spacing: -0.01em;
    }

    .tl-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 999px; padding: 2px 10px;
      font-size: 11px; font-weight: 500; color: var(--muted);
      white-space: nowrap; flex-shrink: 0; letter-spacing: 0.02em;
    }

    .tl-badge.has-photos {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 35%, transparent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }

    .tl-item .tl-meta { color: var(--muted); font-size: 13px; margin-bottom: 8px; }

    .tl-item p { color: #b0bac8; font-size: 14px; line-height: 1.6; }

    .tl-route { margin-top: 10px; font-size: 13px; color: var(--muted); }

    .tl-year {
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      padding: 2px 0 14px; margin-top: 8px;
    }

    .tl-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }

    .tl-filter-chip {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 16px;
      font-size: 13px; font-weight: 500; font-family: inherit; color: var(--muted);
      cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .tl-filter-chip:hover { border-color: var(--border-hover); color: var(--text); }

    .tl-filter-chip.active {
      background: var(--text);
      color: var(--bg);
      border-color: transparent;
    }

    @keyframes backdrop-enter {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes modal-enter {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px); display: none;
      align-items: center; justify-content: center;
      z-index: 1000; padding: 24px;
    }

    .modal-backdrop.open { display: flex; animation: backdrop-enter 0.2s ease; }

    .modal {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; max-width: 860px; width: 100%;
      max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      position: relative;
      animation: modal-enter 0.25s ease;
    }

    .modal header {
      background: var(--panel-2); border-bottom: 1px solid var(--border);
      padding: 18px 22px;
    }

    .modal header h2 {
      font-size: 19px; font-weight: 600; letter-spacing: -0.02em;
    }

    .modal header .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .modal .body { padding: 20px 22px 24px; overflow-y: auto; }

    .modal .body p { margin: 0 0 18px; line-height: 1.65; color: #b0bac8; font-size: 15px; }

    .modal-route {
      margin-top: 16px; padding: 12px 14px;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; color: #b0bac8;
    }

    .modal-route b { color: var(--text); margin-right: 6px; font-weight: 600; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    .gallery img, .gallery video {
      width: 100%; aspect-ratio: 4 / 3; object-fit: cover;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--panel-2); display: block;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .gallery img { cursor: pointer; }

    .gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.45);
      border-color: var(--border-hover);
    }

    .gallery .empty {
      grid-column: 1 / -1; color: var(--muted); font-size: 14px;
      text-align: center; padding: 32px;
      border: 1px dashed var(--border); border-radius: 10px;
    }

    .modal .close {
      position: absolute; top: 16px; right: 18px;
      background: var(--panel); color: var(--muted);
      border: 1px solid var(--border);
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 15px; cursor: pointer; line-height: 1;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }

    .modal .close:hover { color: var(--text); background: var(--panel-2); border-color: var(--border-hover); }

    .modal-header-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-top: 6px;
    }

    .modal-map-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: var(--radius-sm);
      padding: 5px 12px; font-size: 13px; font-weight: 500;
      font-family: inherit; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }

    .modal-map-btn:hover { color: var(--text); background: var(--panel); border-color: var(--border-hover); }

    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.94);
      display: none; align-items: center; justify-content: center;
      z-index: 2000; padding: 24px;
    }

    .lightbox.open { display: flex; }

    .lightbox img, .lightbox video {
      max-width: 90%; max-height: 90%;
      object-fit: contain; border-radius: 6px; user-select: none;
    }

    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 36px; line-height: 1;
      padding: 10px 18px; cursor: pointer; border-radius: 10px;
      transition: background 0.15s; user-select: none;
    }

    .lb-nav:hover { background: rgba(255,255,255,0.18); }
    .lb-nav.hidden { visibility: hidden; pointer-events: none; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    .lb-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
      pointer-events: none; background: rgba(0,0,0,0.45);
      padding: 4px 14px; border-radius: 999px;
    }

    .flag-marker { background: transparent; border: 0; }

    .flag-marker-inner {
      position: relative; width: 34px; height: 23px;
      border-radius: 3px; overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.8);
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .flag-marker:hover .flag-marker-inner {
      transform: scale(1.18);
      box-shadow: 0 4px 14px rgba(0,0,0,0.7);
    }

    .flag-marker-inner .flag-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .tl-flag-img, .popup-flag, .modal-flag-img {
      display: inline-block; vertical-align: middle;
      object-fit: cover; border-radius: 3px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .tl-flag-img    { width: 26px; height: 18px; margin-right: 6px; }
    .popup-flag     { width: 20px; height: 14px; margin-right: 4px; }
    .modal-flag-img { width: 30px; height: 20px; margin-right: 8px; }

    .leaflet-tooltip.route-tooltip {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      font-size: 12px; padding: 4px 9px; border-radius: 6px;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(77, 159, 255, 0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(77, 159, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(77, 159, 255, 0); }
    }

    .flag-pulse-wrap { border-radius: 4px; animation: pulse-ring 2.5s ease-out infinite; }

    .map-counter {
      position: absolute; bottom: 28px; left: 14px; z-index: 900;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 12px;
      font-size: 13px; font-weight: 500; color: var(--muted);
      pointer-events: none; box-shadow: var(--shadow-sm);
    }

    .notice {
      max-width: 680px; margin: 60px auto;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 32px;
      box-shadow: var(--shadow);
    }

    .notice h2 { font-weight: 600; margin-bottom: 8px; }

    .notice code {
      background: var(--panel-2); padding: 2px 6px;
      border-radius: 4px; font-size: 13px;
    }

    /* ── Landen knop in header ─────────────────────────────────── */
    .landen-btn {
      background: transparent; border: 0; padding: 0;
      color: inherit; font: inherit; cursor: pointer;
      text-decoration: underline; text-decoration-style: dotted;
      text-underline-offset: 3px;
      text-decoration-color: color-mix(in srgb, var(--muted) 50%, transparent);
      transition: color 0.15s, text-decoration-color 0.15s;
    }
    .landen-btn:hover { color: var(--text); text-decoration-color: var(--text); }

    /* ── Wereldkaart view ──────────────────────────────────────── */
    #view-world {
      display: flex; flex-direction: column;
      overflow: hidden; background: #090d12;
    }

    #world-svg-wrap { flex: 1; overflow: hidden; min-height: 0; }

    #world-svg { width: 100%; height: 100%; display: block; }

    .world-country { transition: opacity 0.12s; }
    .world-country.visited:hover { opacity: 0.78; }

    .world-footer {
      display: flex; align-items: center; justify-content: center;
      gap: 24px; padding: 10px 24px; flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .world-legend-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; color: var(--muted);
    }

    .world-legend-swatch { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

    #world-tooltip {
      position: fixed; background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 11px; font-size: 13px; color: var(--text);
      pointer-events: none; opacity: 0; transition: opacity 0.1s;
      box-shadow: var(--shadow-sm); z-index: 50; white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Juuls reizen</h1>
      <span id="header-stats" class="header-stats"></span>
    </div>
    <div class="toggle" role="tablist">
      <button id="btn-map" class="active" role="tab" aria-selected="true">Kaart</button>
      <button id="btn-timeline" role="tab" aria-selected="false">Tijdlijn</button>
    </div>
  </header>

  <main>
    <div id="view-map" class="view active">
      <div id="map"></div>
    </div>
    <div id="view-timeline" class="view">
      <div id="timeline"></div>
    </div>

    <div id="view-world" class="view">
      <div id="world-svg-wrap">
        <svg id="world-svg" aria-label="Bezochte landen wereldkaart"></svg>
      </div>
      <div class="world-footer">
        <div class="world-legend-item">
          <div class="world-legend-swatch" style="background:#4d9fff"></div>
          <span id="world-visited-label">Bezocht</span>
        </div>
        <div class="world-legend-item">
          <div class="world-legend-swatch" style="background:#1c2538"></div>
          <span>Nog niet bezocht</span>
        </div>
      </div>
    </div>
  </main>

  <div id="world-tooltip"></div>

  <div id="modal" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="close" aria-label="Sluiten">&times;</button>
      <header>
        <h2 id="modal-title"></h2>
        <div class="modal-header-row">
          <div class="meta" id="modal-meta"></div>
          <button id="modal-map-btn" class="modal-map-btn">Kaart bekijken →</button>
        </div>
      </header>
      <div class="body">
        <p id="modal-desc"></p>
        <div id="modal-gallery" class="gallery"></div>
      </div>
    </div>
  </div>

  <div id="lightbox" class="lightbox">
    <button class="lb-nav" id="lb-prev" aria-label="Vorige foto">&#8249;</button>
    <img id="lightbox-img" alt="" />
    <video id="lightbox-video" controls style="display:none"></video>
    <button class="lb-nav" id="lb-next" aria-label="Volgende foto">&#8250;</button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <script src="vacations.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
